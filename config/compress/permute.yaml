method: "Permute"

kwargs:
  permutation_config:
    N: 2
    M: 4
    n_permutations_0: 8
    n_permutations_1: 8
    block_size: 64
    initalize_method: "Greedy"
    importance_weight: "hessianDiag"


  optimizer_config:
    _target_: "torch.optim.Adam"
    lr: 1e-4

  loss_atol: 1e-8
  loss_rtol: 1e-6
  optimizer_patience: 5
  overall_patience: 10
  permutation_rtol: 1e-3
  n_iters: 100
  n_adam_steps_per_iter: 10
  n_permutation_changes_per_iter: 1

  normalizer_kwargs:
    norm_order: [0, 1]
    zero: [False, False]
    p: 2


  logging_path: "/data/lliu/NoWAG/test/permute.txt"
  plotting_path: "/data/lliu/NoWAG/test/permute.png"



